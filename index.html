<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProEarn - Digital Earning</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.startappjs.com/v1/startapp.js"></script>
</head>
<body>

    <div id="auth-container">
        <div class="auth-card" id="login-box">
            <h2>Login</h2>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-pass" placeholder="Password">
            <button class="main-btn" id="login-btn">Login</button>
            <p id="to-reg-btn">New here? <span class="gold-text">Register Account</span></p>
        </div>

        <div class="auth-card hidden" id="reg-box">
            <h2>Register</h2>
            <input type="text" id="reg-name" placeholder="Full Name">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-pass" placeholder="Password (6+ chars)">
            <button class="main-btn" id="reg-btn">Create Account</button>
            <p id="to-login-btn">Have account? <span class="gold-text">Login</span></p>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header>
            <div class="logo">ProEarn</div>
            <div class="balance-badge">৳ <span id="u-balance">0.00</span></div>
        </header>
        
        <div id="banner-ad-container"></div>

        <main id="pages">
            <section id="view-home" class="page-view">
                <div class="grid-container">
                    <div class="task-card" id="daily-btn"><i class="fas fa-calendar"></i><p>Daily Bonus</p></div>
                    <div class="task-card" onclick="location.reload()"><i class="fas fa-sync"></i><p>Refresh</p></div>
                </div>
                <div class="item-card"><span>Video Task #1 (৳5)</span> <button class="sm-btn" id="task-btn">Watch</button></div>
            </section>
        </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
