<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earning App - BSL Official</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <div id="auth-page" class="container">
            <header><div class="logo">Earning <span>App</span></div></header>
            <div class="auth-box">
                <h2 id="auth-title">লগইন করুন</h2>
                <input type="email" id="email" placeholder="ইমেইল">
                <input type="password" id="pass" placeholder="পাসওয়ার্ড">
                <div id="reg-inputs" class="hidden">
                    <input type="text" id="name" placeholder="আপনার পুরো নাম">
                </div>
                <button id="auth-btn" class="btn-sm">Login</button>
                <p id="toggle-text" style="margin-top:15px; cursor:pointer;">একাউন্ট নেই? <span onclick="window.toggleAuth()" style="color:#1a237e; font-weight:bold;">রেজিস্ট্রেশন করুন</span></p>
            </div>
        </div>

        <div id="main-page" class="hidden">
            <header><div class="logo">Earning <span>App</span></div></header>
            <div class="container main-content">
                <div id="view-home" class="page-view">
                    <div class="user-card">
                        <h3>স্বাগতম, <span id="u-name-display">...</span></h3>
                        <div class="balance-card">
                            <p>আপনার ব্যালেন্স</p>
                            <h2>৳ <span id="u-balance">0.00</span></h2>
                        </div>
                    </div>
                    <div class="task-grid">
                        <div class="task-card" onclick="window.runTask(2)">🎁 ডেইলি বোনাস</div>
                        <div class="task-card" onclick="window.changeTab('spin')">🎡 স্পিন করুন</div>
                        <div class="task-card" onclick="window.runTask(5)">🎬 ভিডিও টাস্ক</div>
                        <div class="task-card" onclick="window.changeTab('withdraw')">💸 উইথড্র</div>
                    </div>
                </div>

                <div id="view-leader" class="page-view hidden">
                    <div class="user-card"><h2>সেরা ১০ জন 🏆</h2><div id="lb-list">লোড হচ্ছে...</div></div>
                </div>

                <div id="view-profile" class="page-view hidden">
                    <div class="user-card">
                        <h2>প্রোফাইল 👤</h2>
                        <div class="profile-info">
                            <p><strong>নাম:</strong> <span id="p-name">...</span></p>
                            <p><strong>ইমেইল:</strong> <span id="p-email">...</span></p>
                            <p><strong>ব্যালেন্স:</strong> ৳ <span id="p-balance">0.00</span></p>
                        </div>
                        <button onclick="window.logout()" class="btn-sm" style="background:#ff5252; color:white; margin-top:15px;">লগআউট</button>
                    </div>
                </div>
                
                <div id="view-withdraw" class="page-view hidden">
                    <div class="auth-box">
                        <h3>উইথড্র রিকোয়েস্ট</h3>
                        <select id="method"><option value="bKash">bKash</option><option value="Nagad">Nagad</option></select>
                        <input type="number" id="w-amount" placeholder="পরিমাণ (মিন: ৫০)">
                        <input type="text" id="w-number" placeholder="নাম্বার">
                        <button onclick="window.submitWithdraw()" class="btn-sm">Submit</button>
                    </div>
                </div>
            </div>

            <nav class="bottom-nav">
                <div class="nav-item active" id="nav-home" onclick="window.changeTab('home')"><span class="nav-icon">🏠</span>হোম</div>
                <div class="nav-item" id="nav-leader" onclick="window.changeTab('leader')"><span class="nav-icon">🏆</span>সেরা</div>
                <div class="nav-item" id="nav-profile" onclick="window.changeTab('profile')"><span class="nav-icon">👤</span>প্রোফাইল</div>
            </nav>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
