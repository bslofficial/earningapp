<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Earning</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.startappjs.com/v1/startapp.js"></script>

    <style>
        /* আপনার দেওয়া CSS কোড (অপরিবর্তিত) */
        :root {
            --bg: #0b0b0d;
            --card: #1a1a1d;
            --gold: #ffcc00;
            --violet: #8a2be2;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0;
            padding-bottom: 70px; /* Nav bar এর জন্য জায়গা */
        }

        .hidden { display: none !important; }

        /* Auth Styling */
        .auth-card {
            max-width: 350px; margin: 100px auto;
            background: var(--card); padding: 20px;
            border-radius: 15px; border: 1px solid var(--gold);
            text-align: center;
        }

        input {
            width: 90%; padding: 10px; margin: 10px 0;
            background: #333; border: none; color: white; border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            background: linear-gradient(45deg, var(--violet), var(--gold));
            border: none; padding: 10px 20px; color: black; font-weight: bold;
            border-radius: 5px; cursor: pointer; width: 95%;
        }

        /* App Header & Nav */
        header {
            background: var(--card); padding: 15px;
            border-bottom: 2px solid var(--violet);
            overflow: hidden;
        }

        .balance { color: var(--gold); font-size: 1.2rem; float: right; }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%;
            background: var(--card); display: flex;
            justify-content: space-around; padding: 10px 0;
            border-top: 1px solid var(--gold);
            z-index: 1000;
        }

        .bottom-nav div { text-align: center; font-size: 0.8rem; cursor: pointer; color: var(--text); }
        .bottom-nav i { display: block; font-size: 1.2rem; color: var(--gold); }

        /* Task Items */
        .task-item {
            background: var(--card); margin: 10px; padding: 15px;
            border-radius: 10px; display: flex; justify-content: space-between;
            align-items: center;
        }

        /* বিজ্ঞাপনের জন্য অতিরিক্ত স্টাইল */
        #banner-ad-box {
            margin: 10px;
            height: 60px;
            background: #222;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

    <div id="auth-container">
        <div class="auth-card" id="login-box">
            <h2>Login</h2>
            <input type="email" id="login-email" placeholder="Email Address">
            <input type="password" id="login-pass" placeholder="Password">
            <button onclick="app.login()">Login Now</button>
            <p style="font-size: 12px; margin-top: 15px;" onclick="app.toggleAuth(true)">Register New Account</p>
        </div>
        <div class="auth-card hidden" id="reg-box">
            <h2>Register</h2>
            <input type="text" id="reg-name" placeholder="Full Name">
            <input type="email" id="reg-email" placeholder="Email Address">
            <input type="password" id="reg-pass" placeholder="Password">
            <button onclick="app.register()">Create Account</button>
            <p style="font-size: 12px; margin-top: 15px;" onclick="app.toggleAuth(false)">Back to Login</p>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header>
            <span style="font-weight: bold; color: var(--violet);">Daily Earning</span>
            <span class="balance">৳ <span id="u-balance">0.00</span></span>
        </header>

        <div id="banner-ad-box">
            <span>Loading Banner Ads...</span>
        </div>

        <div id="view-home" class="page-view">
            <div class="task-item" onclick="app.dailyCheck()">
                <span>Daily Bonus</span>
                <i class="fas fa-gift" style="color: var(--gold);"></i>
            </div>
            <div class="task-item" onclick="app.changeView('task')">
                <span>Watch Video Ads</span>
                <i class="fas fa-play-circle" style="color: var(--violet);"></i>
            </div>
        </div>

        <div id="view-task" class="page-view hidden">
            <div class="task-item">
                <span>Task #1 (Watch Ad)</span>
                <button style="width: 70px;" onclick="app.completeTask(5)">Start</button>
            </div>
        </div>

        <div id="view-wallet" class="page-view hidden">
            <div class="auth-card" style="margin-top: 20px;">
                <h3>Withdraw</h3>
                <input type="number" id="w-amount" placeholder="Amount">
                <input type="text" id="w-number" placeholder="Number">
                <button onclick="app.requestWithdraw()">Withdraw Now</button>
            </div>
        </div>

        <div class="bottom-nav">
            <div onclick="app.changeView('home')"><i class="fas fa-home"></i>Home</div>
            <div onclick="app.changeView('task')"><i class="fas fa-tasks"></i>Task</div>
            <div onclick="app.changeView('wallet')"><i class="fas fa-wallet"></i>Wallet</div>
            <div onclick="location.reload()"><i class="fas fa-sign-out-alt"></i>Logout</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";
        import { getDatabase, ref, set, get, update, push, onValue } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDvbee_sFG5mIhFPEPO8ggizDByB0byTAM",
            authDomain: "earning-web-app-d515c.firebaseapp.com",
            projectId: "earning-web-app-d515c",
            databaseURL: "https://earning-web-app-d515c-default-rtdb.firebaseio.com",
            storageBucket: "earning-web-app-d515c.appspot.com",
            messagingSenderId: "940476940339",
            appId: "1:940476940339:web:eb81b99117e9294fc86346"
        };

        const fApp = initializeApp(firebaseConfig);
        const auth = getAuth(fApp);
        const db = getDatabase(fApp);

        // --- Start.io Ads Initialization ---
        const startApp = new StartApp("202682403");

        const app = {
            toggleAuth: (isReg) => {
                document.getElementById('login-box').classList.toggle('hidden', isReg);
                document.getElementById('reg-box').classList.toggle('hidden', !isReg);
            },

            register: async () => {
                const name = document.getElementById('reg-name').value;
                const email = document.getElementById('reg-email').value;
                const pass = document.getElementById('reg-pass').value;
                try {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await set(ref(db, 'users/' + res.user.uid), { name, email, balance: 0 });
                    alert("Registered!");
                } catch (e) { alert(e.message); }
            },

            login: async () => {
                const email = document.getElementById('login-email').value;
                const pass = document.getElementById('login-pass').value;
                try { await signInWithEmailAndPassword(auth, email, pass); } catch (e) { alert("Login failed!"); }
            },

            changeView: (viewId) => {
                document.querySelectorAll('.page-view').forEach(v => v.classList.add('hidden'));
                document.getElementById('view-' + viewId).classList.remove('hidden');
                // ইন্টারস্টিশিয়াল অ্যাড দেখানো
                startApp.showInterstitial();
            },

            dailyCheck: async () => {
                startApp.showInterstitial();
                const user = auth.currentUser;
                const snap = await get(ref(db, `users/${user.uid}`));
                await update(ref(db, `users/${user.uid}`), { balance: snap.val().balance + 2 });
                alert("Daily Bonus ৳2 added!");
            },

            completeTask: async (amount) => {
                // রিওয়ার্ডেড ভিডিও অ্যাড
                startApp.showRewarded({
                    onVideoFinished: async () => {
                        const user = auth.currentUser;
                        const snap = await get(ref(db, `users/${user.uid}`));
                        await update(ref(db, `users/${user.uid}`), { balance: snap.val().balance + amount });
                        alert("Task Reward ৳" + amount + " added!");
                    }
                });
            },

            requestWithdraw: async () => {
                const amount = document.getElementById('w-amount').value;
                const number = document.getElementById('w-number').value;
                const user = auth.currentUser;
                const snap = await get(ref(db, `users/${user.uid}`));
                if(snap.val().balance < amount) return alert("Insufficient Balance!");
                const newReq = push(ref(db, 'withdrawals'));
                await set(newReq, { uid: user.uid, amount, number, status: 'pending' });
                await update(ref(db, `users/${user.uid}`), { balance: snap.val().balance - amount });
                alert("Withdraw Requested!");
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                // ব্যানার অ্যাড লোড করা
                startApp.loadBanner("banner-ad-box");
                onValue(ref(db, 'users/' + user.uid), (snap) => {
                    document.getElementById('u-balance').innerText = snap.val().balance.toFixed(2);
                });
            }
        });

        window.app = app;
    </script>
</body>
</html>
