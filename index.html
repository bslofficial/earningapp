<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProEarn - Digital Earning Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.startappjs.com/v1/startapp.js"></script>
</head>
<body>

    <div id="auth-container">
        <div class="auth-card" id="login-box">
            <h2><i class="fas fa-lock"></i> Login</h2>
            <input type="email" id="login-email" placeholder="Email Address">
            <input type="password" id="login-pass" placeholder="Password">
            <button class="main-btn" id="login-btn">Login Now</button>
            <p style="cursor:pointer; margin-top:15px;" id="go-to-reg">Don't have an account? <span style="color:#FFD700">Register</span></p>
        </div>

        <div class="auth-card hidden" id="reg-box">
            <h2><i class="fas fa-user-plus"></i> Register</h2>
            <input type="text" id="reg-name" placeholder="Full Name">
            <input type="email" id="reg-email" placeholder="Email Address">
            <input type="password" id="reg-pass" placeholder="Password">
            <button class="main-btn" id="reg-btn">Create Account</button>
            <p style="cursor:pointer; margin-top:15px;" id="go-to-login">Already have an account? <span style="color:#FFD700">Login</span></p>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header>
            <div>ProEarn</div>
            <div class="balance-badge">৳ <span id="u-balance">0.00</span></div>
        </header>
        <div id="view-home" class="page-view">
            <div class="slider">Banner Ads Slot</div>
            <div class="grid-container">
                <div class="task-card" id="daily-btn"><i class="fas fa-calendar-check"></i><div>Daily Bonus</div></div>
                <div class="task-card" id="task-nav"><i class="fas fa-play-circle"></i><div>Watch Ads</div></div>
                <div class="task-card"><i class="fas fa-dice"></i><div>Lucky Spin</div></div>
                <div class="task-card" id="wallet-nav"><i class="fas fa-wallet"></i><div>Withdraw</div></div>
            </div>
        </div>
        
        <nav class="bottom-nav">
            <div class="nav-item active" id="nav-home"><i class="fas fa-home"></i>Home</div>
            <div class="nav-item" id="nav-task"><i class="fas fa-tasks"></i>Task</div>
            <div class="nav-item" id="nav-wallet"><i class="fas fa-wallet"></i>Wallet</div>
            <div class="nav-item" id="logout-btn"><i class="fas fa-sign-out-alt"></i>Logout</div>
        </nav>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
