<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earning App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="auth-page" class="container">
            <header>
                <div class="logo">Earning <span>App</span></div>
                <p>২০২৬ সালের সেরা ইনকাম অ্যাপ</p>
            </header>
            <div class="auth-box">
                <h2 id="auth-title">লগইন করুন</h2>
                <div id="login-inputs">
                    <input type="email" id="email" placeholder="ইমেইল">
                    <input type="password" id="pass" placeholder="পাসওয়ার্ড">
                </div>
                <div id="reg-inputs" class="hidden">
                    <input type="text" id="name" placeholder="আপনার নাম">
                </div>
                <button id="auth-btn" class="btn-sm">Login</button>
                <p id="toggle-text">একাউন্ট নেই? <span onclick="window.toggleAuth()">রেজিস্ট্রেশন করুন</span></p>
            </div>
        </div>

        <div id="main-page" class="hidden">
            <header><div class="logo">Earning <span>App</span></div></header>
            <div class="container">
                <div class="user-card">
                    <h3>স্বাগতম, <span id="u-name-display">...</span></h3>
                    <div class="balance-card">
                        <p>আপনার ব্যালেন্স</p>
                        <h2>৳ <span id="u-balance">0.00</span></h2>
                    </div>
                </div>

                <div class="task-grid">
                    <div class="task-card" onclick="window.runTask(2)">🎁 ডেইলি বোনাস</div>
                    <div class="task-card" onclick="window.runTask(5)">🎬 ভিডিও টাস্ক</div>
                    <div class="task-card" id="btn-withdraw-ui">💸 উইথড্র</div>
                </div>

                <div id="withdraw-section" class="auth-box hidden">
                    <h3>টাকা উত্তোলন</h3>
                    <input type="number" id="w-amount" placeholder="পরিমাণ (মিন: ৫০)">
                    <input type="text" id="w-number" placeholder="বিকাশ/নগদ নাম্বার">
                    <button onclick="window.submitWithdraw()" class="btn-sm">Request Withdraw</button>
                </div>
            </div>

            <nav class="bottom-nav">
                <div class="nav-item active" onclick="window.logout()">👤 লগআউট</div>
            </nav>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
