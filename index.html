<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earning App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="custom-alert" class="alert-overlay hidden">
        <div class="alert-box">
            <h3>Earning App</h3>
            <p id="alert-msg"></p>
            <button onclick="window.closeAlert()">ঠিক আছে</button>
        </div>
    </div>

    <div id="app">
        <div id="auth-page" class="container">
            <header><div class="logo">Earning <span>App</span></div></header>
            <div class="auth-box">
                <h2 id="auth-title">লগইন করুন</h2>
                <input type="email" id="email" placeholder="ইমেইল">
                <input type="password" id="pass" placeholder="পাসওয়ার্ড">
                <div id="reg-inputs" class="hidden">
                    <input type="text" id="name" placeholder="আপনার নাম">
                    <input type="text" id="refer-by" placeholder="রেফার কোড (যদি থাকে)">
                </div>
                <button id="auth-btn" class="btn-sm">প্রবেশ করুন</button>
                <p style="margin-top:15px; cursor:pointer;">একাউন্ট নেই? <span onclick="window.toggleAuth()" style="color:#1a237e; font-weight:bold;">রেজিস্ট্রেশন করুন</span></p>
            </div>
        </div>

        <div id="main-page" class="hidden">
            <header><div class="logo">Earning <span>App</span></div></header>
            <div class="container main-content">
                
                <div id="view-home" class="page-view">
                    <div class="user-card">
                        <h3>স্বাগতম, <span id="u-name-display">...</span></h3>
                        <div class="balance-card">
                            <p>আপনার ব্যালেন্স</p>
                            <h2>৳ <span id="u-balance">0.00</span></h2>
                        </div>
                    </div>
                    <div class="task-grid">
                        <div class="task-card" onclick="window.dailyBonus()">🎁 ডেইলি বোনাস</div>
                        <div class="task-card" onclick="window.changeTab('spin')">🎡 লাকি স্পিন</div>
                        <div class="task-card" onclick="window.runVideoTask()">🎬 ভিডিও টাস্ক</div>
                        <div class="task-card" onclick="window.changeTab('withdraw')">💸 উইথড্র</div>
                    </div>
                </div>

                <div id="view-leaderboard" class="page-view hidden">
                    <div class="user-card">
                        <h2>সেরা ১০০ ইউজার 🏆</h2>
                        <div id="leaderboard-list"></div>
                    </div>
                </div>

                <div id="view-spin" class="page-view hidden">
                    <div class="user-card">
                        <h2>লাকি স্পিন 🎡</h2>
                        <div class="wheel-wrapper"><div id="wheel"></div></div>
                        <button id="spin-btn" onclick="window.startSpin()" class="btn-sm">স্পিন করুন</button>
                    </div>
                </div>

                <div id="view-profile" class="page-view hidden">
                    <div class="user-card">
                        <h2>প্রোফাইল 👤</h2>
                        <div class="refer-box">
                            <p>আপনার রেফার কোড</p>
                            <h3 id="u-refer-code">লোড হচ্ছে...</h3>
                            <button onclick="window.copyRefer()" class="btn-sm" style="background:#4caf50; color:white; margin-top:10px;">কোড কপি করুন</button>
                        </div>
                        <button onclick="window.logout()" class="btn-sm" style="background:#ff5252; color:white; margin-top:20px;">লগআউট</button>
                    </div>
                </div>

                <div id="view-withdraw" class="page-view hidden">
                    <div class="auth-box">
                        <h3>উইথড্র (মিন: ৫০০)</h3>
                        <select id="method"><option value="bKash">bKash</option><option value="Nagad">Nagad</option></select>
                        <input type="number" id="w-amount" placeholder="পরিমাণ">
                        <input type="text" id="w-number" placeholder="নাম্বার">
                        <button onclick="window.submitWithdraw()" class="btn-sm">সাবমিট</button>
                    </div>
                </div>
            </div>

            <nav class="bottom-nav">
                <div class="nav-item active" id="nav-home" onclick="window.changeTab('home')"><i class="fa fa-home"></i><br>হোম</div>
                <div class="nav-item" id="nav-leaderboard" onclick="window.changeTab('leaderboard')"><i class="fa fa-trophy"></i><br>সেরা</div>
                <div class="nav-item" id="nav-profile" onclick="window.changeTab('profile')"><i class="fa fa-user"></i><br>প্রোফাইল</div>
            </nav>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
