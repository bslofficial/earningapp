<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProEarn</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.startappjs.com/v1/startapp.js"></script>
</head>
<body>
    <div id="auth-container">
        <div class="auth-card" id="login-box">
            <h2 style="color:var(--gold)">Login</h2>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-pass" placeholder="Password">
            <button class="main-btn" id="btn-login">Login Now</button>
            <p onclick="toggleAuth(true)">Register New Account</p>
        </div>
        <div class="auth-card hidden" id="reg-box">
            <h2 style="color:var(--gold)">Register</h2>
            <input type="text" id="reg-name" placeholder="Name">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-pass" placeholder="Password">
            <button class="main-btn" id="btn-reg">Create Account</button>
            <p onclick="toggleAuth(false)">Back to Login</p>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header>
            <div style="font-weight:bold">ProEarn</div>
            <div class="balance-badge">৳ <span id="u-balance">0.00</span></div>
        </header>
        <div id="view-home" class="page-view">
            <div class="slider" id="start-banner-ad">Ad Loading...</div>
            <div class="grid-container">
                <div class="task-card" id="btn-daily">Daily Bonus</div>
                <div class="task-card" onclick="changeView('task')">Watch Ads</div>
                <div class="task-card" onclick="changeView('wallet')">Withdraw</div>
                <div class="task-card" onclick="changeView('profile')">Profile</div>
            </div>
        </div>
        <div id="view-task" class="page-view hidden">
            <div class="task-card" style="margin:20px" id="btn-video">Video Task (৳5)</div>
            <button class="main-btn" onclick="changeView('home')">Back</button>
        </div>
        <div id="view-wallet" class="page-view hidden">
            <div style="padding:20px">
                <input type="number" id="w-amount" placeholder="Amount">
                <input type="text" id="w-number" placeholder="Number">
                <button class="main-btn" id="btn-withdraw">Withdraw</button>
                <button class="main-btn" onclick="changeView('home')" style="background:#444">Back</button>
            </div>
        </div>
        <div id="view-profile" class="page-view hidden">
            <div style="text-align:center; padding:50px">
                <h3 id="u-name-display">Name</h3>
                <button class="main-btn" onclick="location.reload()">Logout</button>
            </div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
