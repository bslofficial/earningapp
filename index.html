<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProEarn - Digital Earning Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.startappjs.com/v1/startapp.js"></script>
</head>
<body>

    <div id="auth-container">
        <div class="auth-card" id="login-box">
            <h2><i class="fas fa-unlock-alt"></i> Login</h2>
            <input type="email" id="login-email" placeholder="Email Address">
            <input type="password" id="login-pass" placeholder="Password">
            <button class="main-btn" id="btn-login">Login Now</button>
            <p style="font-size: 12px; margin-top: 15px;" id="go-to-reg">Don't have an account? <span style="color:var(--gold)">Register</span></p>
        </div>
        <div class="auth-card hidden" id="reg-box">
            <h2><i class="fas fa-user-plus"></i> Register</h2>
            <input type="text" id="reg-name" placeholder="Full Name">
            <input type="email" id="reg-email" placeholder="Email Address">
            <input type="password" id="reg-pass" placeholder="Password (6+ chars)">
            <button class="main-btn" id="btn-register">Create Account</button>
            <p style="font-size: 12px; margin-top: 15px;" id="go-to-login">Already have an account? <span style="color:var(--gold)">Login</span></p>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header>
            <div style="font-weight: 600;">Pro<span style="color:var(--violet)">Earn</span></div>
            <div class="balance-badge">৳ <span id="u-balance">0.00</span></div>
        </header>

        <div class="notice">
            <marquee id="msg-scroll">Welcome! Watch ads and earn money daily. Minimum withdraw ৳50.</marquee>
        </div>

        <div id="view-home" class="page-view">
            <div id="banner-ad-home" style="width:100%; height:50px; background:#111; margin:10px 0;"></div>
            
            <div class="grid-container">
                <div class="task-card" id="btn-daily">
                    <i class="fas fa-calendar-check"></i>
                    <div>Daily Bonus</div>
                </div>
                <div class="task-card" id="nav-task">
                    <i class="fas fa-play-circle"></i>
                    <div>Watch Ads</div>
                </div>
                <div class="task-card" id="nav-wallet">
                    <i class="fas fa-money-check-alt"></i>
                    <div>Withdraw</div>
                </div>
                <div class="task-card" id="nav-profile">
                    <i class="fas fa-user-circle"></i>
                    <div>Profile</div>
                </div>
            </div>
        </div>

        <div id="view-task" class="page-view hidden">
            <h3 style="padding: 15px;">Available Tasks</h3>
            <div style="padding: 0 15px;">
                <div class="task-card" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <span>Video Task #1 (৳5)</span>
                    <button class="main-btn" style="width: 80px; margin: 0;" id="btn-task-1">Start</button>
                </div>
            </div>
        </div>

        <div id="view-wallet" class="page-view hidden">
            <div class="wallet-ui">
                <div class="method-box">
                    <h4>Withdraw Funds</h4>
                    <select id="w-method" style="width: 100%; padding: 10px; border-radius: 5px; background: #333; color: white; border: none;">
                        <option value="Bkash">bKash</option>
                        <option value="Nagad">Nagad</option>
                    </select>
                    <input type="number" id="w-amount" placeholder="Min Amount 50">
                    <input type="text" id="w-number" placeholder="Account Number">
                    <button class="main-btn" id="btn-withdraw">Submit Request</button>
                </div>
            </div>
        </div>

        <div id="view-profile" class="page-view hidden">
            <div style="padding: 20px; text-align: center;">
                <i class="fas fa-user-circle" style="font-size: 60px; color: var(--violet);"></i>
                <h3 id="u-name-display">User Name</h3>
                <p id="u-email-display" style="color: var(--gray);"></p>
                <button class="main-btn" style="background: #ff4444;" id="btn-logout">Logout</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" id="foot-home"><i class="fas fa-home"></i>Home</div>
            <div class="nav-item" id="foot-task"><i class="fas fa-tasks"></i>Task</div>
            <div class="nav-item" id="foot-wallet"><i class="fas fa-wallet"></i>Wallet</div>
            <div class="nav-item" id="foot-profile"><i class="fas fa-user"></i>Profile</div>
        </nav>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
