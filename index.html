<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProEarn - Digital Earning</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://glamourpicklessteward.com/6d/b2/36/6db2366de43d3dfa9ae8be0cd1702de6.js"></script>
</head>
<body>
    <div id="auth-container">
        <div class="auth-card" id="login-box">
            <h2 style="color:#FFD700"><i class="fas fa-lock"></i> Login</h2>
            <input type="email" id="login-email" placeholder="Email Address">
            <input type="password" id="login-pass" placeholder="Password">
            <button class="main-btn" id="btn-login">Login Now</button>
            <p onclick="toggleAuth(true)" style="margin-top:15px; cursor:pointer">Don't have an account? <span style="color:#FFD700">Register</span></p>
        </div>
        
        <div class="auth-card hidden" id="reg-box">
            <h2 style="color:#FFD700"><i class="fas fa-user-plus"></i> Register</h2>
            <input type="text" id="reg-name" placeholder="Full Name">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-pass" placeholder="Password (6+ chars)">
            <button class="main-btn" id="btn-reg">Create Account</button>
            <p onclick="toggleAuth(false)" style="margin-top:15px; cursor:pointer">Back to Login</p>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header style="display:flex; justify-content:space-between; align-items:center; padding:15px; background:#121214; border-bottom:1px solid #333">
            <div style="font-weight:bold">ProEarn</div>
            <div style="background:rgba(138,43,226,0.2); padding:5px 15px; border-radius:20px; border:1px solid #8A2BE2; color:#FFD700">
                ৳ <span id="u-balance">0.00</span>
            </div>
        </header>

        <div id="view-home" class="page-view">
            <div style="margin:15px; text-align:center; min-height:100px; background:#1e1e22; border-radius:10px; padding:10px">
                <div id="container-dbf6f2ec476c869e3e4b1aca55ca5248"></div>
                <script async="async" data-cfasync="false" src="https://glamourpicklessteward.com/dbf6f2ec476c869e3e4b1aca55ca5248/invoke.js"></script>
            </div>

            <div class="grid-container" style="display:grid; grid-template-columns:1fr 1fr; gap:15px; padding:15px">
                <div class="task-card" id="btn-daily" style="background:#121214; padding:20px; border-radius:15px; text-align:center; border:1px solid #222">
                    <i class="fas fa-calendar-alt" style="color:#8A2BE2; font-size:24px"></i><br>Daily Bonus
                </div>
                <div class="task-card" onclick="changeView('task')" style="background:#121214; padding:20px; border-radius:15px; text-align:center; border:1px solid #222">
                    <i class="fas fa-play-circle" style="color:#8A2BE2; font-size:24px"></i><br>Watch Ads
                </div>
            </div>
        </div>

        <div id="view-task" class="page-view hidden" style="padding:20px">
            <div class="task-card" id="btn-reward" style="background:#121214; padding:20px; border-radius:15px; text-align:center; border:1px solid #8A2BE2; margin-bottom:20px">
                Video Task #1 (৳5)
            </div>
            <button class="main-btn" onclick="changeView('home')">Back to Home</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";
        import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDvbee_sFG5mIhFPEPO8ggizDByB0byTAM",
            authDomain: "earning-web-app-d515c.firebaseapp.com",
            projectId: "earning-web-app-d515c",
            storageBucket: "earning-web-app-d515c.firebasestorage.app",
            messagingSenderId: "940476940339",
            appId: "1:940476940339:web:eb81b99117e9294fc86346"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Global Navigation
        window.toggleAuth = (isReg) => {
            document.getElementById('login-box').classList.toggle('hidden', isReg);
            document.getElementById('reg-box').classList.toggle('hidden', !isReg);
        };

        window.changeView = (v) => {
            document.querySelectorAll('.page-view').forEach(p => p.classList.add('hidden'));
            document.getElementById('view-' + v).classList.remove('hidden');
        };

        // Login Logic
        document.getElementById('btn-login').addEventListener('click', () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            if(!email || !pass) return alert("Email & Password required!");
            
            signInWithEmailAndPassword(auth, email, pass)
                .then(() => { alert("Login Successful!"); })
                .catch(e => { alert("Login Failed: " + e.message); });
        });

        // Register Logic
        document.getElementById('btn-reg').addEventListener('click', () => {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            
            createUserWithEmailAndPassword(auth, email, pass).then(res => {
                set(ref(db, 'users/' + res.user.uid), { name, email, balance: 0 });
                alert("Account Created!");
            }).catch(e => alert(e.message));
        });

        // Auth State
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                
                onValue(ref(db, 'users/' + user.uid), (snap) => {
                    if(snap.exists()) {
                        document.getElementById('u-balance').innerText = (snap.val().balance || 0).toFixed(2);
                    }
                });
            }
        });

        // Reward Logic
        document.getElementById('btn-daily').onclick = async () => {
            const user = auth.currentUser;
            const snap = await get(ref(db, `users/${user.uid}`));
            update(ref(db, `users/${user.uid}`), { balance: (snap.val().balance || 0) + 2 });
            alert("৳2 Bonus Added!");
        };

        document.getElementById('btn-reward').onclick = async () => {
            const user = auth.currentUser;
            const snap = await get(ref(db, `users/${user.uid}`));
            update(ref(db, `users/${user.uid}`), { balance: (snap.val().balance || 0) + 5 });
            alert("৳5 Reward Added!");
        };
    </script>
</body>
</html>
