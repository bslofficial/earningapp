<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProEarn</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.startappjs.com/v1/startapp.js"></script>
</head>
<body>
    <div id="auth-container">
        <div class="auth-card" id="login-box">
            <h2 style="color:var(--gold)">Login</h2>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-pass" placeholder="Password">
            <button class="main-btn" id="btn-login" onclick="handleLogin()">Login Now</button>
            <p onclick="toggleAuth(true)">Register New Account</p>
        </div>
        
        <div class="auth-card hidden" id="reg-box">
            <h2 style="color:var(--gold)">Register</h2>
            <input type="text" id="reg-name" placeholder="Name">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-pass" placeholder="Password">
            <button class="main-btn" id="btn-reg" onclick="handleRegister()">Create Account</button>
            <p onclick="toggleAuth(false)">Back to Login</p>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header>
            <div style="font-weight:bold">ProEarn</div>
            <div class="balance-badge">৳ <span id="u-balance">0.00</span></div>
        </header>
        <div id="view-home" class="page-view">
            <div class="slider" id="start-banner-ad">Ad Loading...</div>
            <div class="grid-container">
                <div class="task-card" onclick="handleDaily()">Daily Bonus</div>
                <div class="task-card" onclick="changeView('task')">Watch Ads</div>
                <div class="task-card" onclick="changeView('wallet')">Withdraw</div>
                <div class="task-card" onclick="changeView('profile')">Profile</div>
            </div>
        </div>
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";
        import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDvbee_sFG5mIhFPEPO8ggizDByB0byTAM",
            authDomain: "earning-web-app-d515c.firebaseapp.com",
            projectId: "earning-web-app-d515c",
            storageBucket: "earning-web-app-d515c.firebasestorage.app",
            messagingSenderId: "940476940339",
            appId: "1:940476940339:web:eb81b99117e9294fc86346"
        };

        const fApp = initializeApp(firebaseConfig);
        const auth = getAuth(fApp);
        const db = getDatabase(fApp);
        const startApp = new StartApp("202682403");

        // ফাংশনগুলো গ্লোবাল উইন্ডোতে এক্সপোর্ট করা
        window.toggleAuth = (isReg) => {
            document.getElementById('login-box').classList.toggle('hidden', isReg);
            document.getElementById('reg-box').classList.toggle('hidden', !isReg);
        };

        window.handleLogin = () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            signInWithEmailAndPassword(auth, email, pass)
                .then(() => alert("Logging in..."))
                .catch(e => alert("Error: " + e.message));
        };

        window.handleRegister = () => {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            createUserWithEmailAndPassword(auth, email, pass)
                .then(res => {
                    set(ref(db, 'users/' + res.user.uid), { name, email, balance: 0 });
                    alert("Registration Successful!");
                })
                .catch(e => alert(e.message));
        };

        window.changeView = (v) => {
            document.querySelectorAll('.page-view').forEach(p => p.classList.add('hidden'));
            document.getElementById('view-' + v).classList.remove('hidden');
            startApp.showInterstitial();
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                onValue(ref(db, 'users/' + user.uid), (snap) => {
                    if(snap.exists()) {
                        document.getElementById('u-balance').innerText = snap.val().balance;
                    }
                });
            }
        });
    </script>
</body>
</html>
