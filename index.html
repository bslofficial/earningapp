<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProEarn - Digital Earning</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://glamourpicklessteward.com/6d/b2/36/6db2366de43d3dfa9ae8be0cd1702de6.js"></script>
</head>
<body>
    <div id="auth-container">
        <div class="auth-card" id="login-box">
            <h2 style="color:var(--gold)">Login</h2>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-pass" placeholder="Password">
            <button class="main-btn" id="btn-login" onclick="handleLogin()">Login Now</button>
            <p onclick="toggleAuth(true)">Register New Account</p>
        </div>
        
        <div class="auth-card hidden" id="reg-box">
            <h2 style="color:var(--gold)">Register</h2>
            <input type="text" id="reg-name" placeholder="Name">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-pass" placeholder="Password">
            <button class="main-btn" id="btn-reg" onclick="handleRegister()">Create Account</button>
            <p onclick="toggleAuth(false)">Back to Login</p>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header>
            <div style="font-weight:bold">ProEarn</div>
            <div class="balance-badge">৳ <span id="u-balance">0.00</span></div>
        </header>

        <div id="view-home" class="page-view">
            <div class="slider" style="height: auto; min-height: 100px; padding: 10px;">
                <div id="container-dbf6f2ec476c869e3e4b1aca55ca5248"></div>
                <script async="async" data-cfasync="false" src="https://glamourpicklessteward.com/dbf6f2ec476c869e3e4b1aca55ca5248/invoke.js"></script>
            </div>

            <div class="grid-container">
                <div class="task-card" onclick="handleDaily()">Daily Bonus</div>
                <div class="task-card" onclick="changeView('task')">Watch Ads</div>
                <div class="task-card" onclick="changeView('wallet')">Withdraw</div>
                <div class="task-card" onclick="changeView('profile')">Profile</div>
            </div>
        </div>

        <div id="view-task" class="page-view hidden">
            <div class="task-card" style="margin:20px" onclick="handleTaskReward()">Video Task (৳5)</div>
            <button class="main-btn" onclick="changeView('home')">Back</button>
        </div>

        <div id="view-wallet" class="page-view hidden">
            <div style="padding:20px">
                <input type="number" id="w-amount" placeholder="Amount">
                <input type="text" id="w-number" placeholder="Number">
                <button class="main-btn" onclick="alert('Request Sent!')">Withdraw</button>
                <button class="main-btn" onclick="changeView('home')" style="background:#444">Back</button>
            </div>
        </div>

        <div id="view-profile" class="page-view hidden">
            <div style="text-align:center; padding:50px">
                <h3 id="u-name-display">User</h3>
                <button class="main-btn" onclick="location.reload()">Logout</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";
        import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDvbee_sFG5mIhFPEPO8ggizDByB0byTAM",
            authDomain: "earning-web-app-d515c.firebaseapp.com",
            projectId: "earning-web-app-d515c",
            storageBucket: "earning-web-app-d515c.firebasestorage.app",
            messagingSenderId: "940476940339",
            appId: "1:940476940339:web:eb81b99117e9294fc86346"
        };

        const fApp = initializeApp(firebaseConfig);
        const auth = getAuth(fApp);
        const db = getDatabase(fApp);

        window.toggleAuth = (isReg) => {
            document.getElementById('login-box').classList.toggle('hidden', isReg);
            document.getElementById('reg-box').classList.toggle('hidden', !isReg);
        };

        window.handleLogin = () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            signInWithEmailAndPassword(auth, email, pass).catch(e => alert("Error: " + e.message));
        };

        window.handleRegister = () => {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            createUserWithEmailAndPassword(auth, email, pass).then(res => {
                set(ref(db, 'users/' + res.user.uid), { name, email, balance: 0 });
            }).catch(e => alert(e.message));
        };

        window.changeView = (v) => {
            document.querySelectorAll('.page-view').forEach(p => p.classList.add('hidden'));
            document.getElementById('view-' + v).classList.remove('hidden');
        };

        window.handleDaily = async () => {
            const user = auth.currentUser;
            const snap = await get(ref(db, `users/${user.uid}`));
            update(ref(db, `users/${user.uid}`), { balance: (snap.val().balance || 0) + 2 });
            alert("৳2 Bonus Added!");
        };

        window.handleTaskReward = async () => {
            const user = auth.currentUser;
            const snap = await get(ref(db, `users/${user.uid}`));
            update(ref(db, `users/${user.uid}`), { balance: (snap.val().balance || 0) + 5 });
            alert("৳5 Task Reward Added!");
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                onValue(ref(db, 'users/' + user.uid), (snap) => {
                    if(snap.exists()){
                        document.getElementById('u-balance').innerText = snap.val().balance.toFixed(2);
                        document.getElementById('u-name-display').innerText = snap.val().name;
                    }
                });
            }
        });
    </script>
</body>
</html>
