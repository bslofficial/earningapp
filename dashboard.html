<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Earning App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/startapp/startapp-v1.js"></script>
</head>
<body>
    <div class="main-wrapper">
        <header><div class="logo">BSL<span>Dashboard</span></div></header>
        <div class="container">
            <div class="user-card">
                <h3>স্বাগতম, <span id="u-name-display">...</span></h3>
                <div class="balance-box">
                    <p>আপনার ব্যালেন্স</p>
                    <h1>৳ <span id="u-balance">0.00</span></h1>
                </div>
            </div>
            <div class="task-grid">
                <div class="task-card" id="btn-daily">🎁 ডেইলি বোনাস</div>
                <div class="task-card" onclick="window.location.href='spin.html'">🎡 স্পিন করুন</div>
                <div class="task-card" id="btn-video">🎬 ভিডিও টাস্ক</div>
                <div class="task-card" id="btn-withdraw-ui">💸 উইথড্র</div>
            </div>

            <div id="withdraw-section" class="auth-box hidden" style="margin-top:20px;">
                <h3>টাকা উত্তোলন</h3>
                <select id="method"><option value="bKash">bKash</option><option value="Nagad">Nagad</option></select>
                <input type="number" id="w-amount" placeholder="পরিমাণ (মিন: ৫০)">
                <input type="text" id="w-number" placeholder="নাম্বার">
                <button id="btn-withdraw-submit" class="btn-sm">Request</button>
            </div>
        </div>
    </div>
    <script type="module" src="dashboard.js"></script>
</body>
</html>
