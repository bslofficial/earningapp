<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earning App - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><div class="logo">Earning <span>App</span></div></header>
    
    <div class="container">
        <div id="view-home" class="page-view">
            <div class="user-card">
                <h3>স্বাগতম, <span id="u-name-display">BSL GAMES</span></h3>
                <div style="background:#1a237e; color:#ffca28; padding:20px; border-radius:15px; margin-top:10px;">
                    <p>আপনার ব্যালেন্স</p>
                    <h2>৳ <span id="u-balance">0.00</span></h2>
                </div>
            </div>

            <div class="task-grid">
                <div class="task-card" id="btn-daily">🎁 ডেইলি বোনাস</div>
                <div class="task-card" id="btn-spin">🎡 স্পিন করুন</div>
                <div class="task-card" id="btn-video">🎬 ভিডিও টাস্ক</div>
                <div class="task-card" id="btn-withdraw-ui">💸 উইথড্র</div>
            </div>

            <div class="extra-btn-container">
                <div class="extra-card" id="btn-history-home">🕒 হিস্ট্রি</div>
                <div class="extra-card" id="btn-team-home">👥 রেফার টিম</div>
            </div>

            <div id="withdraw-section" class="auth-box hidden" style="margin-top:20px;">
                <h3>টাকা উত্তোলন</h3>
                <select id="w-method">
                    <option value="bKash">bKash</option>
                    <option value="Nagad">Nagad</option>
                </select>
                <input type="number" id="w-amount" placeholder="পরিমাণ (মিন: ৫০)">
                <input type="text" id="w-number" placeholder="বিকাশ/নগদ নাম্বার">
                <button id="btn-withdraw-submit" class="btn-sm">Request Withdraw</button>
            </div>
        </div>

        <div id="view-history" class="page-view hidden"><div class="user-card"><h2>হিস্ট্রি</h2><div id="history-data"></div></div></div>
        <div id="view-team" class="page-view hidden"><div class="user-card"><h2>রেফার টিম</h2><div id="team-data"></div></div></div>
        <div id="view-profile" class="page-view hidden"><div class="user-card"><h2>প্রোফাইল</h2><button onclick="logout()" class="btn-sm">লগআউট</button></div></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="changeTab('home')"><span class="nav-icon">🏠</span>হোম</div>
        <div class="nav-item" id="nav-refer" onclick="changeTab('refer')"><span class="nav-icon">👥</span>রেফার</div>
        <div class="nav-item" id="nav-leader" onclick="changeTab('leader')"><span class="nav-icon">🏆</span>সেরা</div>
        <div class="nav-item" id="nav-profile" onclick="changeTab('profile')"><span class="nav-icon">👤</span>প্রোফাইল</div>
    </nav>

    <script type="module" src="dashboard.js"></script>
</body>
</html>
